name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Test
        run: TRASH_BYPASS=1 cargo test --workspace -- --test-threads=1
      - name: Verify completions generated
        run: |
          test -f target/completions/trash.bash
          test -f target/completions/_trash
          test -f target/completions/trash.fish
      - name: Verify man pages generated
        run: |
          test -f target/man/trash.1
          test -f target/man/trash-compress.1
          test -f target/man/trash-du.1
