# trashd configuration
#
# Layered config:
#   /etc/trashd/config.toml        — global (admin-managed)
#   ~/.config/trashd/config.toml   — per-user override
#
# Scalars: user overrides global overrides defaults.
# Lists (never_trash, bypass_processes): user extends global — admin-set
# patterns cannot be removed by individual users.

[retention]
# Auto-purge items older than this
max_age_days = 30
# Maximum total trash size
max_size_gb = 10.0
# Purge oldest items when disk usage exceeds this
disk_pressure_percent = 90

# Paths that should never be trashed (use real delete instead).
# Supports trailing * and leading *. wildcards.
# User configs extend this list (they cannot remove entries set here).
never_trash = [
    "/tmp/*",
    "/var/tmp/*",
    "/var/cache/*",
    "/proc/*",
    "/sys/*",
    "/dev/*",
    "/dev/shm/*",
    "/run/*",
    "*.o",
    "*.pyc",
    "*.class",
    "*.lock",
    "*.pid",
    "*.sock",
    "*.socket",
    "*.tmp",
    "*.swp",
    "*~",
    "__pycache__/*",
    "node_modules/*",
    "target/debug/*",
    "target/release/*",
    "*/.git/*",
]

# If set, ONLY files matching these patterns are trashed.
# Everything else is real-deleted. `never_trash` still takes priority.
# Empty (default) means all files are eligible for trash.
# User config replaces global (not additive — it's a whitelist).
# Example: only_trash = ["*.py", "*.rs", "*.sql", "*.env", "*.conf"]
only_trash = []

# Per-directory overrides: place a .trashd.toml in any directory with
# `never_trash` and/or `only_trash` lists. Searched up to 5 parent levels.
# Example .trashd.toml:
#   never_trash = ["build/*", "dist/*"]
#   only_trash = ["src/*", "*.config"]

# Processes that bypass trash automatically.
# When these commands invoke rm, files are really deleted.
# User configs extend this list (they cannot remove entries set here).
bypass_processes = [
    "apt",
    "apt-get",
    "dpkg",
    "yum",
    "dnf",
    "pacman",
    "rpm",
    "pip",
    "cargo",
    "npm",
    "make",
    "git",
    "systemd",
    "systemctl",
    "journald",
    "containerd",
    "dockerd",
]

# Executable paths that bypass trash. More precise than bypass_processes —
# matches the exe path prefix instead of just the binary name.
# Example: bypass_paths = ["/opt/myapp/", "/usr/lib/systemd/"]
bypass_paths = []

# Files larger than this (in MB) skip trash to avoid filling disk.
# Set to 0 to disable.
max_file_size_mb = 1024

# Directories larger than this (in MB) skip trash (real-deleted).
# Set to 0 (default) to disable the limit.
max_dir_size_mb = 0

# Hash algorithm for file integrity: "xxhash" (fast, default) or "sha256" (cryptographic).
# xxhash (XXH3-128) is ~10x faster than SHA-256 — good for integrity checks.
# SHA-256 is better if you need cryptographic verification.
hash_algorithm = "xxhash"

# Files smaller than this (in MB) get a hash on trash for integrity checking.
# Set to 0 to disable hashing entirely. Default is 1 MB.
sha256_max_size_mb = 1

# Minimum seconds between auto-purge scans. Auto-purge checks retention
# policy (age, size, disk pressure) but scanning the entire trash on every
# deletion is expensive. Default: 60 seconds.
auto_purge_interval_secs = 60
